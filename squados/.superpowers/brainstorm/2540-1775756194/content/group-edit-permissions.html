<h2>Quem pode editar grupos?</h2>
<p class="subtitle">Nome, imagem, descrição, adicionar/remover membros</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Somente Admin e Master Admin</h3>
      <p>Igual à criação — apenas quem tem papel administrativo pode alterar grupos.</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Admin do sistema + criador do grupo</h3>
      <p>Quem criou o grupo também pode editar, mesmo sendo Gestor ou Operador.</p>
    </div>
  </div>
</div>
